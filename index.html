<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handbag - ElOria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <div class="header-title">Handbag Collection</div>
      <div class="header-right">
        <div class="heart">♡</div>
        <a href="https://dubnooo.github.io/pay/" class="cart-link">
          🛒 <span id="cart-count">0</span>
        </a>
      </div>
    </header>

    <div class="products-grid">
        <div class="product">
            <div class="img-wrapper">
                <img src="https://hometextiles.cxlbylacroix.com/cdn/shop/collections/20210215_CXL_CollectionImages_Mode.jpg?v=1704452322" alt="Чорний худі">
                <div class="product-heart">♡</div>
            </div>
            <div class="price">400.99 ₴</div>
            <button class="buy-btn" onclick="addToCart('Black Heartbeat Hoodie', 400.99, 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500')">Купити</button>
        </div>

        <div class="product">
            <div class="img-wrapper">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQuywugLAwhukmAnHeELdixM-1OKIRDNcrGs2pS1sB6UA&s" alt="Коричневий худі">
                <div class="product-heart">♡</div>
            </div>
            <div class="price">370.99 ₴</div>
            <button class="buy-btn" onclick="addToCart('Brown Zip Hoodie', 370.99, 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR5ENy_34IBw5st0x6Q6eLt3pY22DvmCEHdTg&s')">Купити</button>
        </div>

        <div class="product">
            <div class="img-wrapper">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTu4Cx__jLspths0c6ufKekXpk20vXxJ84eulg216o4Hg&s" alt="Чорний худі LA">
                <div class="product-heart">♡</div>
            </div>
            <div class="price">450.99 ₴</div>
            <button class="buy-btn" onclick="addToCart('LA Black Hoodie', 450.99, 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQqxFKK8nM-nze2-oqrZj6bAWF89mR3BmZf6Q&s')">Купити</button>
        </div>

        <div class="product">
            <div class="img-wrapper">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTxYZO6XDO7UPlNrZGaWxMC64LvxhpvSpExAYZ-y8rKyA&s" alt="Білий худі метелик">
                <div class="product-heart">♡</div>
            </div>
            <div class="price">299.99 ₴</div>
            <button class="buy-btn" onclick="addToCart('White Butterfly Hoodie', 299.99, 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRBqab9L5D8qQrHNGXTQyU7naFzcuQTLBJ-og&s')">Купити</button>
        </div>

        <div class="product">
            <div class="img-wrapper">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQRLEHhGVOJ_LFX2xDylJuj5JTISBfh9-Dn853q_lT6cQ&s" alt="Paris Hoodie">
                <div class="product-heart">♡</div>
            </div>
            <div class="price">300.99 ₴</div>
            <button class="buy-btn" onclick="addToCart('Paris C\'est la vie', 300.99, 'https://cdn.27.ua/sc--media--prod/default/7a/de/cd/7adecd6c-0924-4bd5-b7e2-ba0f1ba0ea4e.jpg')">Купити</button>
        </div>

        <div class="product">
            <div class="img-wrapper">
                <img src="https://m.media-amazon.com/images/I/51BoSxVke9L._AC_SY900_.jpg" alt="White Heart Hoodie">
                <div class="product-heart">♡</div>
            </div>
            <div class="price">499.99 ₴</div>
            <button class="buy-btn" onclick="addToCart('White Heart Hoodie', 499.99, 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDYC8HakBYaiNfdylMQ2SaKtnpsK3KE8LvjTYhlN4VPw&s')">Купити</button>
        </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
